spring.application.name=hirezo
spring.datasource.url=jdbc:postgresql://localhost:5432/hirezoflow
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging for DB connection and SQL
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Actuator health endpoint
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

jwt.secret=hirezo-hirezo-hirezo-hirezo-hirezo-hirezo-hirezo-hirezo-secret-key
jwt.expiration-ms=86400000